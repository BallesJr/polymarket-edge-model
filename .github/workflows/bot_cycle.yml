name: Polymarket Paper Trading Bot

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "Elpip"

      - name: Install dependencies
        run: pip install requests pandas numpy scikit-learn matplotlib

      - name: Run bot cycle
        run: python bot.py

      - name: Commit portfolio state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/paper_portfolio.json || true
          git add data/*.csv || true
          git diff --staged --quiet || git commit -m "bot: portfolio update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
